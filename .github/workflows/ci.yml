name: CI

on:
  push:
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          # python3-toml via apt: plain `pip install` hits PEP 668
          # (externally-managed-environment) on ubuntu-24.04 runners
          sudo apt-get install -y net-tools python3-toml

      - name: Build
        run: make clean && make

      - name: Run test harness
        run: ./test_repo.sh

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-logs
          path: |
            outs/
            auditlog
            oliver.out
            stdout.txt
          if-no-files-found: ignore

  zig-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Set up Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2

      - name: Run Zig unit tests
        run: zig build test

      - name: Build C server with Zig
        run: zig build

      - name: Run Zig HTTP workload runner against the mock server
        run: zig build test-http

      - name: Run Zig HTTP workload runner against the real C server
        run: zig build test-http -- zig-out/bin/httpserver

  sanitizers:
    # TSan-only (see test_scripts/san_stress.sh's header comment): ASan stays
    # a local/manual tool since valgrind already gates memory safety in M4.
    # TSan is the genuinely new coverage -- concurrency invariants the
    # black-box suites can't observe unless a race happens to perturb
    # response ordering.
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Set up Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2

      - name: Install dependencies
        run: |
          sudo apt-get update
          # python3-toml via apt: plain `pip install` hits PEP 668
          # (externally-managed-environment) on ubuntu-24.04 runners
          sudo apt-get install -y net-tools python3-toml

      - name: Run TSan stress suite
        run: test_scripts/san_stress.sh thread 10

  differential:
    # Gating: cross-check httpserver's HTTP semantics (status codes + GET body
    # bytes) against nginx over the audit_* workloads. Deterministic, so it
    # gates (unlike the perf benchmark below). See bench/differential.zig.
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Set up Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2

      - name: Install dependencies
        run: |
          sudo apt-get update
          # nginx-full ships ngx_http_dav_module (PUT); net-tools = netstat for
          # test_scripts/utils.sh port polling (ss is already on the runner).
          sudo apt-get install -y nginx-full net-tools

      - name: Build C server
        run: make clean && make

      - name: Semantic differential vs nginx
        run: bench/differential.sh

  benchmark:
    # Non-gating (informational): perf comparison httpserver vs nginx. CI
    # runners are too noisy to threshold on, so this never fails the build; the
    # results table is uploaded as an artifact. Uses the Nix devShell because
    # oha isn't in apt (nginx + oha + wrk + zig all come from flake.nix).
    runs-on: ubuntu-latest
    continue-on-error: true
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: DeterminateSystems/nix-installer-action@main

      - name: Benchmark httpserver vs nginx (small, informational)
        run: nix develop -c env REQS=1000 CONC=20 DUR=3 bench/bench.sh

      - name: Upload benchmark results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bench-results
          path: bench/results/
          if-no-files-found: ignore
